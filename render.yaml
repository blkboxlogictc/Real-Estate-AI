services:
  - type: web
    name: real-estate-ai-backend
    env: node
    buildCommand: pnpm install --frozen-lockfile && pnpm run build:deploy
    startCommand: node --enable-source-maps ./artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_OPTIONS
        value: --max-old-space-size=400
      - key: NODE_ENV
        value: production