kind = "web"
previewPath = "/"
title = "Real Estate AI Assistant"
version = "1.0.0"
id = "artifacts/reaa"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19949

[services.development]
run = "pnpm --filter @workspace/reaa run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/reaa", "run", "build" ]
publicDir = "artifacts/reaa/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19949"
BASE_PATH = "/"
